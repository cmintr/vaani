<svg width="1180" height="720" viewBox="0 0 1180 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vaani local-first Android AI companion architecture</title>
  <desc id="desc">Architecture diagram showing Android UI, conversation engine, local model runtime, memory, tool gate, and QA evidence loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1180" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0D12"/>
      <stop offset="0.55" stop-color="#12182A"/>
      <stop offset="1" stop-color="#181021"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B2030"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7B5BFF"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 34px Inter, Segoe UI, Arial, sans-serif; fill: #F5F7FB; }
      .subtitle { font: 400 15px Inter, Segoe UI, Arial, sans-serif; fill: #AAB6C8; }
      .section { font: 700 17px Inter, Segoe UI, Arial, sans-serif; fill: #FFFFFF; }
      .body { font: 400 13px Inter, Segoe UI, Arial, sans-serif; fill: #C9D3E3; }
      .small { font: 400 11px Inter, Segoe UI, Arial, sans-serif; fill: #95A3B8; }
      .metric { font: 700 18px Inter, Segoe UI, Arial, sans-serif; fill: #FFFFFF; }
      .label { font: 700 11px Inter, Segoe UI, Arial, sans-serif; fill: #99A8C0; letter-spacing: 1.4px; }
      .chip { fill: rgba(123,91,255,0.13); stroke: rgba(123,91,255,0.55); stroke-width: 1; }
      .card { fill: url(#card); stroke: rgba(255,255,255,0.09); stroke-width: 1; filter: url(#shadow); }
      .line { stroke: #7B5BFF; stroke-width: 2.2; marker-end: url(#arrow); }
      .line2 { stroke: #33D6FF; stroke-width: 2.2; marker-end: url(#arrow); }
      .dash { stroke: rgba(255,255,255,0.22); stroke-width: 1.5; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect width="1180" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="140" cy="95" r="150" fill="#7B5BFF" opacity="0.11"/>
  <circle cx="1030" cy="620" r="210" fill="#33D6FF" opacity="0.08"/>
  <circle cx="970" cy="120" r="120" fill="#FF6B9A" opacity="0.08"/>

  <text x="58" y="70" class="title">Vaani architecture</text>
  <text x="58" y="100" class="subtitle">Pre-release local-first Android AI companion - measured ARM64 inference, memory, voice and QA gates.</text>
  <rect x="912" y="48" width="210" height="38" rx="19" class="chip"/>
  <text x="937" y="72" class="label">PORTFOLIO EXTRACT</text>

  <rect x="56" y="146" width="216" height="128" rx="22" class="card"/>
  <text x="82" y="182" class="label">ENTRY POINTS</text>
  <text x="82" y="212" class="section">Android user surfaces</text>
  <text x="82" y="239" class="body">Chat, voice turn, onboarding</text>
  <text x="82" y="260" class="small">Flutter UI - debug-gated tools hidden</text>

  <rect x="56" y="352" width="216" height="128" rx="22" class="card"/>
  <text x="82" y="388" class="label">VOICE PATH</text>
  <text x="82" y="418" class="section">STT to TTS loop</text>
  <text x="82" y="445" class="body">Harnessed reminder turns</text>
  <text x="82" y="466" class="small">p50/p95 2797/2934ms baseline</text>

  <rect x="360" y="120" width="260" height="150" rx="24" class="card"/>
  <text x="390" y="158" class="label">ORCHESTRATION</text>
  <text x="390" y="190" class="section">Conversation engine</text>
  <text x="390" y="218" class="body">Routes local inference, memory</text>
  <text x="390" y="239" class="body">retrieval, tool decisions and</text>
  <text x="390" y="260" class="body">deferred cloud-only actions.</text>

  <rect x="360" y="330" width="260" height="150" rx="24" class="card"/>
  <text x="390" y="368" class="label">MEMORY</text>
  <text x="390" y="400" class="section">Hybrid RAG layer</text>
  <text x="390" y="428" class="body">sqlite-vec + EmbeddingGemma</text>
  <text x="390" y="449" class="body">300M 768D + FTS5/BM25</text>
  <text x="390" y="470" class="small">Reciprocal-rank fusion k=60</text>

  <rect x="700" y="120" width="260" height="150" rx="24" class="card"/>
  <text x="730" y="158" class="label">LOCAL BRAIN</text>
  <text x="730" y="190" class="section">LiteRT-LM runtime</text>
  <text x="730" y="218" class="body">Gemma 4 E4B container</text>
  <text x="730" y="239" class="body">3,659,530,240 bytes</text>
  <text x="730" y="260" class="small">p50 decode 14.8 tok/s</text>

  <rect x="700" y="330" width="260" height="150" rx="24" class="card"/>
  <text x="730" y="368" class="label">SAFETY GATE</text>
  <text x="730" y="400" class="section">Tool classifier</text>
  <text x="730" y="428" class="body">Local tools execute locally.</text>
  <text x="730" y="449" class="body">Cloud-only tools defer honestly.</text>
  <text x="730" y="470" class="small">No silent fallback path.</text>

  <rect x="1004" y="224" width="122" height="152" rx="22" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.10)"/>
  <text x="1030" y="262" class="label">QA</text>
  <text x="1024" y="294" class="section">Evidence</text>
  <text x="1024" y="321" class="small">Appium</text>
  <text x="1024" y="342" class="small">logcat gates</text>
  <text x="1024" y="363" class="small">release scans</text>

  <path d="M272 210 C315 210 322 196 360 196" class="line"/>
  <path d="M272 416 C319 416 321 405 360 405" class="line2"/>
  <path d="M620 195 C657 195 663 195 700 195" class="line"/>
  <path d="M620 405 C657 405 663 405 700 405" class="line2"/>
  <path d="M490 270 C490 300 490 302 490 330" class="dash"/>
  <path d="M830 270 C830 300 830 302 830 330" class="dash"/>
  <path d="M960 195 C988 212 997 235 1004 274" class="line"/>
  <path d="M960 405 C988 392 998 369 1004 332" class="line2"/>

  <rect x="56" y="558" width="1070" height="104" rx="24" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.10)"/>
  <text x="86" y="592" class="label">MEASURED SNAPSHOT</text>
  <text x="86" y="626" class="metric">14.8 tok/s</text>
  <text x="86" y="648" class="small">local decode p50</text>
  <text x="276" y="626" class="metric">290ms</text>
  <text x="276" y="648" class="small">first-token p50</text>
  <text x="456" y="626" class="metric">2.797s</text>
  <text x="456" y="648" class="small">voice harness p50</text>
  <text x="646" y="626" class="metric">3.41 GiB</text>
  <text x="646" y="648" class="small">model container</text>
  <text x="846" y="626" class="metric">470+</text>
  <text x="846" y="648" class="small">evidence artifacts</text>
  <text x="1006" y="626" class="metric">NPU rejected</text>
  <text x="1006" y="648" class="small">35-43s vs 1.668s CPU</text>
</svg>
